<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boac RHU</title>
    <link rel="stylesheet" href="/static/login-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-wrapper">
        <div class="login-card">
            
            <header class="card-header">
                <img src="/image/logo.png" alt="Municipality of Boac Logo" class="rhu-logo">
                <div class="header-text">
                    <h1>RHU BOAC</h1>
                    <h2>Anti-Rabies Vaccine Reminder System</h2>
                </div>
            </header>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <i class="far fa-eye-slash" id="togglePassword"></i>
                    </div>
                </div>

                <div class="remember-group">
                    <input type="checkbox" id="keepLoggedIn" name="keepLoggedIn">
                    <label for="keepLoggedIn">keep me logged in</label>
                </div>

                <div class="submit-group">
                    <button type="submit" class="btn-login">LOGIN</button>
                </div>
            </form>

        </div>
    </div>

    <button id="submit" class="login-button" onclick="window.location.href='registration.html'">LOGIN</button>
    <button id="submit" class="login-button" onclick="window.location.href='/registration'">LOGIN</button>

    <script src="/static/login-page.js"></script>
</body>
</html>
