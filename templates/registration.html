<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Registration - Boac RHU</title>
    <link rel="stylesheet" href="/static/shared.css">
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="/image/logo.png" class="sidebar-logo">
            <h2>RHU BOAC<br>ARVRS</h2>
        </div>
        <ul class="nav-links">
            <li><a href="registration.html" class="active">Patient Registration</a></li>
            <li><a href="reminder-settings.html">Reminder Settings</a></li>
            <li><a href="monitoring-checklist.html">Monitoring</a></li>
            <li><a href="records.html">Records</a></li>
        </ul>
        <div class="sidebar-footer">
            <p style="margin-bottom: 10px; opacity: 0.8;">Municipality of Boac © 2026</p>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <main class="main-content">
        <div class="card">
            <h2 class="page-title">Patient Registration</h2>
            <form id="regForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="pName" placeholder="e.g., Juan Dela Cruz" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Birthday</label>
                        <input type="date" id="pBirthday" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="pPhone" placeholder="09123456789" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="pAddress" placeholder="Street, Barangay, Municipality" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Bite (Day 0)</label>
                        <input type="date" id="pBiteDate" required>
                    </div>
                    <div class="form-group">
                        <label>1st Dosage Date & Time</label>
                        <div style="display:flex; gap:5px;">
                            <input type="date" id="pDate" required style="flex:2;">
                            <input type="time" id="pTime" required style="flex:1;">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save</button>
            </form>
        </div>
    </main>

    <script>
        // Registration Logic
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('pName').value,
                birthday: document.getElementById('pBirthday').value,
                phone: document.getElementById('pPhone').value,
                address: document.getElementById('pAddress').value,
                biteDate: document.getElementById('pBiteDate').value,
                firstDoseDate: document.getElementById('pDate').value,
                firstDoseTime: document.getElementById('pTime').value
            };
            sessionStorage.setItem('temp_patient', JSON.stringify(data));
            window.location.href = 'reminder-settings.html';
        });

        // Logout Logic
        function handleLogout() {
            if (confirm("Are you sure you want to logout?")) {
                sessionStorage.clear();
                window.location.href = '/logout';
            }
        }
    </script>
</body>

</html>
