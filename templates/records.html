<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Records - Boac RHU</title>
    <link rel="stylesheet" href="/static/shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="/image/logo.png" class="sidebar-logo">
            <h2>RHU BOAC<br>ARVRS</h2>
        </div>
        <ul class="nav-links">
            <li><a href="registration.html">Registration</a></li>
            <li><a href="reminder-settings.html">Reminder Settings</a></li>
            <li><a href="monitoring-checklist.html">Monitoring</a></li>
            <li><a href="records.html" class="active">Records</a></li>
        </ul>
        <div class="sidebar-footer">
            <p style="margin-bottom: 10px; opacity: 0.8;">Municipality of Boac © 2026</p>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <main class="main-content">
        <div class="card">
            <h2 class="page-title">Completed Records</h2>
            <input type="text" id="search" class="search-bar" placeholder="Search by Name, Age, Address, Doses, or Dates...">
            
            <table class="records-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Address</th>
                        <th>Dosages</th>
                        <th>Date of Bite</th>
                        <th>Treatment Duration</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="recordsTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        function calculateAge(birthDate) {
            const birth = new Date(birthDate);
            const now = new Date();
            let age = now.getFullYear() - birth.getFullYear();
            if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) {
                age--;
            }
            return age;
        }

        async function renderRecords(query = "") {
            const body = document.getElementById('recordsTableBody');
            try {
                const response = await fetch('/api/patients');
                const pts = await response.json();
                const q = query.toLowerCase();
                
                const filtered = pts.filter(p => {
                    if (!p.completed) return false;

                    const age = calculateAge(p.birthday).toString();
                    const dosageCount = p.fullSchedule.length.toString();
                    const biteDate = p.bite_date || "";
                    const start = p.fullSchedule[0].date;
                    const end = p.fullSchedule[p.fullSchedule.length - 1].date;
                    const duration = `${start} to ${end}`.toLowerCase();

                    return (
                        p.name.toLowerCase().includes(q) ||
                        p.address.toLowerCase().includes(q) ||
                        age.includes(q) ||
                        dosageCount.includes(q) ||
                        biteDate.includes(q) ||
                        duration.includes(q)
                    );
                }).sort((a,b) => a.name.localeCompare(b.name));

                if(filtered.length === 0) {
                    body.innerHTML = '<tr><td colspan="7" style="text-align:center;">No matching records found.</td></tr>';
                    return;
                }

                body.innerHTML = filtered.map(p => {
                    const start = p.fullSchedule[0].date;
                    const end = p.fullSchedule[p.fullSchedule.length - 1].date;
                    return `
                        <tr>
                            <td><strong>${p.name}</strong></td>
                            <td>${calculateAge(p.birthday)}</td>
                            <td>${p.address}</td>
                            <td>${p.fullSchedule.length} doses</td>
                            <td>${p.bite_date}</td>
                            <td>${start} to ${end}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteRecord(${p.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error fetching records:", error);
                body.innerHTML = '<tr><td colspan="7" style="text-align:center;">Error loading records.</td></tr>';
            }
        }

        async function deleteRecord(patientId) {
            if(!confirm("Are you sure you want to delete this record permanentally? This action cannot be undone.")) return;
            
            try {
                const response = await fetch('/api/delete_patient', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patientId })
                });
                const result = await response.json();
                if (result.success) {
                    renderRecords();
                } else {
                    alert("Error deleting record: " + result.message);
                }
            } catch (error) {
                console.error("Error deleting record:", error);
                alert("An error occurred while deleting the record.");
            }
        }

        document.getElementById('search').oninput = (e) => renderRecords(e.target.value);

        function handleLogout() {
            if(confirm("Are you sure you want to logout?")) {
                sessionStorage.clear();
                window.location.href = '/logout';
            }
        }

        window.onload = () => renderRecords();
    </script>
</body>
</html>
